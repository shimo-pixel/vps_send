# 一键起 MinIO + Flask：Flask 容器内必须用服务名 minio:9000，不能用 127.0.0.1
# docker compose up -d
# 仅起 API（MinIO 已在别处）：可删掉 minio 服务，并把 MINIO_ENDPOINT 改成可达地址（见 .env.example）

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_PUBLISH_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - minio-net
    restart: unless-stopped

  minio-flask-api:
    build: .
    image: minio-flask-api:local
    restart: unless-stopped
    depends_on:
      - minio
    environment:
      # 覆盖 .env 里错误的 127.0.0.1：容器内 127.0.0.1 不是宿主机
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}
    env_file:
      - .env
    ports:
      - "${FLASK_PORT:-5000}:5000"
    networks:
      - minio-net

networks:
  minio-net:
    driver: bridge

volumes:
  minio-data:
